{% extends "base.html" %}

{% block title %}Registration Page{% endblock %}

{% block content %}
<style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-image: linear-gradient(rgba(20, 30, 48, 0.7), rgba(36, 59, 85, 0.7), url("https://tse1.mm.bing.net/th/id/OIP.hzTOX5AXR1NJmFsAEyehmAHaE8?pid=Api&P=0&h=180"));
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .signup-container {
            background-color: #ffffff;
            width: 340px;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 128, 0, 0.1);
            border-left: 5px solid #28a745;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #2e7d32;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid lightgrey;
            border-radius: 6px; 
            font-size: 14px;
        }

        input:focus {
            border-color: #43a047;
            outline: none;
            box-shadow: 0 0 3px rgba(67, 160, 71, 0.3);
        }

        button {
            background-color: #28a745; 
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            font-size: 15px;
            margin-top: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        p {
            text-align: center;
            color: white;
            font-size: 14px;
        }
    </style>

<div class="container">
    <div class="signup-container">
        <h1 style="color: #007bff; margin-top: 0;">Register Here</h1>
        
        <form action="/registration" method="post">
            <label for="username">Username</label>
            <input name="username" type="text" id=username placeholder="Enter your username" required>
            
            <label for="email">Email</label>
            <input name="email" type="email" id=email placeholder="example@email.com" required>

            <label for="password">Password</label>
            <input name="password" type="password" id=password placeholder="******" required>

            <label for="role">Role</label>
            <select name="role" id="role">
                <option value="student">Student</option>
                <option value="company">Company</option>
            </select>

            <button type="submit">Sign Up!</button>
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </form>
    </div>
{% endblock %}
