<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>

    <style>
        /* Top green bar */
        .nav-bar {
            background-color: #11c5a4; /* green bar */
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        /* Background image full screen */
        body {
            margin: 0;
            padding: 0;
            background-image: url("https://tse1.mm.bing.net/th/id/OIP.hzTOX5AXR1NJmFsAEyehmAHaE8?pid=Api&P=0&h=180");
            background-size: cover;
            background-position: center;
            position: relative;
            font-family: Arial, sans-serif;
        }

        /* Dark see-through layer like the screenshot */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 240%;
            background-color: rgba(0,0,0,0.4); /* transparent black */
            z-index: -1;
        }

        /* Center text */
        .center-text {
            text-align: center;
            margin-top: 200px;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }

        /* Footer simple */
        .site-footer {
            background-color: black;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .site-footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="logo">Placement Portal Application</div>
        <div class="nav-links">
            <a href="{{url_for('login')}}">Login</a>
            <a href="{{url_for('registration')}}">Register</a>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="site-footer">
        <p>&copy; 2026 Placement Portal Application. All Rights Reserved.</p>
    </footer>

</body>
</html>
